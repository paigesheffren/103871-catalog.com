<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>103871 Canada Ltd Catalogue</title>

  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9fafb;
      margin: 0;
      color: #111827;
    }

    .page {
      max-width: 1200px;
      margin: auto;
      padding: 16px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .controls-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .search-bar {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #e5e7eb;
      border-radius: 999px;
      padding: 6px 10px;
      background: #fff;
    }

    .search-bar input {
      border: none;
      outline: none;
      flex: 1;
    }

    select {
      border-radius: 999px;
      padding: 6px 10px;
      border: 1px solid #e5e7eb;
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    th {
      background: #f3f4f6;
    }

    .catalogue {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #e5e7eb;
    }

    .btn {
      display: inline-block;
      margin-bottom: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      background: black;
      color: white;
      text-decoration: none;
      font-size: 0.8rem;
    }
  </style>
</head>

<body>
  <div class="page">

    <h1>103871 Canada Ltd Catalogue</h1>

    <!-- BUTTON -->
    <a class="btn" href="#catalogue">⬇️ View Full Catalogue</a>

    <!-- ========================= -->
    <!-- PJC SECTION (NOW FIRST) -->
    <!-- ========================= -->
    <section id="pjc-gillette-energizer" style="margin-bottom:32px;">

      <h2>PJC Gillette – Energizer</h2>
      <p style="color:#6b7280;">
        Structured catalogue for Gillette & Energizer products.
      </p>

      <!-- PJC Controls -->
      <div class="controls-bar">
        <div class="search-bar">
          🔍
          <input id="pjcSearch" type="text" placeholder="Search PJC...">
        </div>

        <select id="pjcCategoryFilter">
          <option value="all">All categories</option>
          <option value="Gillette Cartridges">Gillette cartridges</option>
          <option value="Gillette Razors">Gillette razors</option>
          <option value="Energizer Alkaline">Energizer alkaline</option>
          <option value="Energizer Lithium">Energizer lithium</option>
        </select>
      </div>

      <!-- TABLE -->
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>PJC #</th>
              <th>UPC</th>
              <th>Description</th>
              <th>Case Pack</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody id="pjcTableBody"></tbody>
        </table>
      </div>

      <div id="pjcEmpty" style="display:none;">
        No results found.
      </div>

    </section>

    <!-- ========================= -->
    <!-- MAIN CATALOGUE -->
    <!-- ========================= -->

    <!-- CONTROLS -->
    <div class="controls-bar">
      <div class="search-bar">
        🔍
        <input id="searchInput" type="text" placeholder="Search products...">
      </div>

      <select id="listedFilter">
        <option value="all">All</option>
        <option value="listed">Listed</option>
        <option value="unlisted">Unlisted</option>
      </select>

      <select id="sortSelect">
        <option value="default">Default</option>
        <option value="name-asc">Name A-Z</option>
        <option value="price-asc">Price ↑</option>
        <option value="price-desc">Price ↓</option>
      </select>
    </div>

    <!-- PRODUCTS -->
    <section class="catalogue" id="catalogue"></section>

    <div id="emptyState" style="display:none;">
      No products match filters.
    </div>

  </div>

  <!-- KEEP YOUR EXISTING JS FILE -->
  <script src="script.js"></script>
</body>
</html>
